<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="An AI operating a GPU fleet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070714"/>
      <stop offset="1" stop-color="#0f0f22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#AD7BFC"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <circle cx="600" cy="300" r="240" fill="url(#accent)" opacity="0.10"/>

  <!-- little robot head -->
  <g transform="translate(600 190)">
    <rect x="-46" y="-34" width="92" height="74" rx="16" fill="#0d0d1f" stroke="url(#accent)" stroke-width="2.5"/>
    <circle cx="-18" cy="0" r="9" fill="#22d3ee"/>
    <circle cx="18" cy="0" r="9" fill="#AD7BFC"/>
    <rect x="-16" y="20" width="32" height="5" rx="2.5" fill="#8b8aae"/>
    <line x1="0" y1="-34" x2="0" y2="-52" stroke="url(#accent)" stroke-width="2.5"/>
    <circle cx="0" cy="-56" r="5" fill="#34d399"/>
  </g>

  <text x="600" y="350" text-anchor="middle" font-family="Inter, sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="-1.5">We let an AI run</text>
  <text x="600" y="416" text-anchor="middle" font-family="Inter, sans-serif" font-size="58" font-weight="800" fill="url(#accent)" letter-spacing="-1.5">the GPU fleet</text>
  <text x="600" y="476" text-anchor="middle" font-family="DM Mono, monospace" font-size="20" fill="#8b8aae">for 24 hours. on purpose.</text>
</svg>
