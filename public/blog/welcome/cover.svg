<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Modelplane blog cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070714"/>
      <stop offset="1" stop-color="#0f0f22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#AD7BFC"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <circle cx="600" cy="337" r="220" fill="url(#accent)" opacity="0.12"/>
  <text x="80" y="330" font-family="Inter, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-2">Welcome to the</text>
  <text x="80" y="404" font-family="Inter, sans-serif" font-size="64" font-weight="800" fill="url(#accent)" letter-spacing="-2">Modelplane blog</text>
  <rect x="80" y="448" width="180" height="6" rx="3" fill="url(#accent)"/>
